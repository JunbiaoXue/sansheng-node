name: sansheng_node
description: OpenClaw Node Controller - 控制安卓设备
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # WebSocket 连接
  web_socket_channel: ^2.4.0
  # HTTP 服务
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  # 权限
  permission_handler: ^11.1.0
  # 通知
  flutter_local_notifications: ^16.3.0
  # TTS
  flutter_tts: ^3.8.5
  # 文件
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
